services:
  postgres:
    image: postgres:16-alpine
    container_name: logohub-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logohub

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logohub"]
      interval: 10s
      timeout: 5s
      retries: 5

  logohub-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: logohub-api

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      PORT: 3000

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: logohub

      DATABASE_URL: postgres://postgres:postgres@postgres:5432/logohub
      DB_CONNECT_RETRIES: 30
      DB_CONNECT_RETRY_DELAY_MS: 2000

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
