services:
  - type: web
    name: logohub-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx wrangler pages dev dist --ip 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
    plan: starter
    region: frankfurt
